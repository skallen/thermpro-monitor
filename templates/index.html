<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ThermPro Monitor</title>
  <style>
    :root {
      --bg-start: #dce8f3;
      --bg-end: #c5d9e6;
      --panel: #ffffff;
      --ink: #1f2933;
      --muted: #5f6c78;
      --temp: #dc5f00;
      --humid: #007e89;
      --accent: #1f6aa2;
      --grid: #d5dee8;
      --border: #bfd0de;
      --drawer: #f8fbfe;
      --shadow: rgba(16, 31, 45, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Avenir Next", "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background: linear-gradient(150deg, var(--bg-start), var(--bg-end));
    }

    .shell {
      position: relative;
      width: 100vw;
      height: 100vh;
      padding: 0.6rem;
      overflow: hidden;
    }

    .chart-panel {
      position: relative;
      width: 100%;
      height: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, #fefefe, #f3f9ff);
      box-shadow: 0 18px 30px rgba(22, 46, 66, 0.16);
      overflow: hidden;
      animation: rise-in 320ms ease-out both;
    }

    @keyframes rise-in {
      from {
        transform: translateY(12px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    #chart {
      width: 100%;
      height: 100%;
      display: block;
    }

    #chartTitle {
      position: absolute;
      top: 0.62rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      text-align: center;
      font-size: clamp(1.15rem, 2.2vw, 1.8rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #1b364a;
      white-space: nowrap;
      max-width: 62vw;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    #batteryBadge {
      position: absolute;
      top: 0.82rem;
      right: 0.82rem;
      z-index: 4;
      font-size: 0.86rem;
      color: #11324b;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      font-weight: 600;
      backdrop-filter: blur(1px);
      pointer-events: none;
    }

    .legend {
      position: absolute;
      left: 0.78rem;
      bottom: 0.56rem;
      z-index: 3;
      display: flex;
      gap: 0.9rem;
      align-items: center;
      flex-wrap: wrap;
      font-size: 0.9rem;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.2rem 0.45rem;
      pointer-events: none;
    }

    #currentTimeDisplay {
      position: absolute;
      top: 1.06rem;
      left: 3.7rem;
      z-index: 6;
      font-size: 0.92rem;
      font-weight: 600;
      color: #23485f;
      letter-spacing: 0.01em;
      pointer-events: none;
      white-space: nowrap;
    }

    .last-update-box {
      position: absolute;
      right: 0.78rem;
      bottom: 0.56rem;
      z-index: 3;
      display: flex;
      gap: 0.35rem;
      align-items: baseline;
      white-space: nowrap;
      font-size: 0.84rem;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.24rem 0.52rem;
      pointer-events: none;
    }

    .time-label {
      font-weight: 600;
      color: #456176;
    }

    .swatch {
      width: 13px;
      height: 13px;
      border-radius: 3px;
      display: inline-block;
      margin-right: 0.32rem;
      vertical-align: -2px;
    }

    .swatch.temp {
      background: var(--temp);
    }

    .swatch.hum {
      background: var(--humid);
    }

    .menu-button {
      position: absolute;
      top: 0.72rem;
      left: 0.8rem;
      width: 42px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.9);
      z-index: 6;
      display: inline-flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      padding: 0 9px;
      cursor: pointer;
    }

    .menu-button:hover {
      background: #ffffff;
    }

    .menu-button .bar {
      width: 100%;
      height: 2px;
      background: #244256;
      border-radius: 999px;
      display: block;
    }

    .control-drawer {
      position: absolute;
      top: 0.6rem;
      left: 0.6rem;
      bottom: 0.6rem;
      width: min(380px, calc(100vw - 1.2rem));
      z-index: 12;
      background: var(--drawer);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 14px 28px var(--shadow);
      transform: translateX(-110%);
      transition: transform 190ms ease-out;
      overflow-y: auto;
      padding: 0.9rem 0.9rem 1rem;
    }

    .control-drawer.open {
      transform: translateX(0);
    }

    .drawer-backdrop {
      position: absolute;
      inset: 0;
      z-index: 11;
      background: rgba(16, 31, 45, 0.22);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease-out;
    }

    .drawer-backdrop.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.85rem;
      padding-bottom: 0.65rem;
      border-bottom: 1px solid var(--border);
    }

    .drawer-title {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: 0.03em;
      color: #1e3a4f;
    }

    .close-button {
      border: 1px solid var(--border);
      background: #fff;
      color: #1e3a4f;
      border-radius: 9px;
      padding: 0.35rem 0.7rem;
      font: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .controls {
      display: grid;
      gap: 0.9rem;
    }

    .control {
      display: grid;
      gap: 0.35rem;
    }

    label {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 600;
    }

    select,
    input[type="number"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.55rem 0.62rem;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }

    .time-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.55rem;
      align-items: center;
    }

    .range-wrap {
      display: grid;
      gap: 0.35rem;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .toggles {
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .toggle {
      display: inline-flex;
      gap: 0.36rem;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.24rem 0.64rem;
      background: #fff;
      font-size: 0.88rem;
    }

    .status {
      margin-top: 0.95rem;
      color: #233849;
      font-size: 0.9rem;
      line-height: 1.35;
      min-height: 4.8rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.58rem 0.64rem;
      background: #ffffff;
      white-space: pre-line;
    }

    .unit-switch {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .unit-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.38rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.24rem 0.64rem;
      background: #fff;
      font-size: 0.88rem;
      cursor: pointer;
    }

    .alias-actions {
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .alias-button {
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0.35rem 0.72rem;
      background: #fff;
      color: #1e3a4f;
      font: inherit;
      font-size: 0.88rem;
      cursor: pointer;
    }

    @media (max-width: 720px) {
      .shell {
        padding: 0.45rem;
      }

      .control-drawer {
        top: 0.45rem;
        left: 0.45rem;
        bottom: 0.45rem;
        width: min(390px, calc(100vw - 0.9rem));
      }

      .legend {
        right: 0.7rem;
        left: 0.7rem;
        justify-content: center;
      }

      #currentTimeDisplay {
        top: 0.98rem;
        left: 3.6rem;
        font-size: 0.85rem;
      }

      .last-update-box {
        right: 0.7rem;
        bottom: 3.05rem;
      }

      #chartTitle {
        font-size: 1.15rem;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="chart-panel">
      <button id="menuButton" class="menu-button" aria-label="Open controls" aria-expanded="false" aria-controls="controlDrawer">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
      <div id="currentTimeDisplay">--:--:--</div>
      <div id="chartTitle">ThermPro Monitor</div>
      <div id="batteryBadge">Battery: --</div>
      <div class="legend">
        <span>CURRENT -</span>
        <span><span class="swatch temp"></span>Temperature: <span id="currentTempValue">--</span></span>
        <span><span class="swatch hum"></span>Humidity: <span id="currentHumidityValue">--</span></span>
      </div>
      <div class="last-update-box">
        <span class="time-label">Last update:</span><span id="lastUpdateValue">--</span>
      </div>
      <canvas id="chart"></canvas>
    </section>

    <div id="drawerBackdrop" class="drawer-backdrop"></div>
    <aside id="controlDrawer" class="control-drawer" aria-hidden="true">
      <div class="drawer-header">
        <h2 class="drawer-title">Controls</h2>
        <button id="closeMenuButton" class="close-button">Close</button>
      </div>

      <section class="controls">
        <div class="control">
          <label for="deviceSelect">Sensor</label>
          <select id="deviceSelect"></select>
        </div>

        <div class="control">
          <label for="windowSeconds">Timescale</label>
          <div class="time-grid">
            <div class="range-wrap">
              <input id="windowSlider" type="range" min="0" max="1000" step="1" value="600">
            </div>
            <input id="windowSeconds" type="number" min="10" max="172800" step="1" value="3600">
          </div>
        </div>

        <div class="control">
          <label>Display values</label>
          <div class="toggles">
            <label class="toggle"><input id="showTemp" type="checkbox" checked> Temperature</label>
            <label class="toggle"><input id="showHumidity" type="checkbox" checked> Humidity</label>
          </div>
        </div>

        <div class="control">
          <label>Temperature unit</label>
          <div class="unit-switch" role="radiogroup" aria-label="Temperature unit">
            <label class="unit-chip"><input id="tempUnitC" type="radio" name="tempUnit" value="C" checked> Celsius</label>
            <label class="unit-chip"><input id="tempUnitF" type="radio" name="tempUnit" value="F"> Fahrenheit</label>
          </div>
        </div>

        <div class="control">
          <label for="sensorAliasInput">Sensor chart name</label>
          <input id="sensorAliasInput" type="text" maxlength="40" placeholder="Enter custom name">
          <div class="alias-actions">
            <button id="saveAliasButton" class="alias-button" type="button">Save Name</button>
            <button id="clearAliasButton" class="alias-button" type="button">Clear</button>
          </div>
        </div>
      </section>

      <div class="status" id="statusText"></div>
    </aside>
  </main>

  <script>
    const MIN_SECONDS = 10;
    const MAX_SECONDS = 172800;
    const REFRESH_MS = 10000;
    const ALIAS_STORAGE_KEY = "thermpro_sensor_aliases_v1";
    const SETTINGS_STORAGE_KEY = "thermpro_dashboard_settings_v1";

    const state = {
      devices: [],
      selectedAddress: null,
      windowSeconds: 3600,
      showTemp: true,
      showHumidity: true,
      temperatureUnit: "C",
      points: [],
      latest: null,
      batteryPct: null,
      drawWidth: 0,
      drawHeight: 0,
      menuOpen: false,
      sensorAliases: {},
      aliasInputAddress: null,
      aliasInputDirty: false,
    };

    const dom = {
      chart: document.getElementById("chart"),
      menuButton: document.getElementById("menuButton"),
      closeMenuButton: document.getElementById("closeMenuButton"),
      controlDrawer: document.getElementById("controlDrawer"),
      drawerBackdrop: document.getElementById("drawerBackdrop"),
      deviceSelect: document.getElementById("deviceSelect"),
      windowSlider: document.getElementById("windowSlider"),
      windowSeconds: document.getElementById("windowSeconds"),
      showTemp: document.getElementById("showTemp"),
      showHumidity: document.getElementById("showHumidity"),
      tempUnitC: document.getElementById("tempUnitC"),
      tempUnitF: document.getElementById("tempUnitF"),
      sensorAliasInput: document.getElementById("sensorAliasInput"),
      saveAliasButton: document.getElementById("saveAliasButton"),
      clearAliasButton: document.getElementById("clearAliasButton"),
      statusText: document.getElementById("statusText"),
      batteryBadge: document.getElementById("batteryBadge"),
      chartTitle: document.getElementById("chartTitle"),
      currentTempValue: document.getElementById("currentTempValue"),
      currentHumidityValue: document.getElementById("currentHumidityValue"),
      currentTimeDisplay: document.getElementById("currentTimeDisplay"),
      lastUpdateValue: document.getElementById("lastUpdateValue"),
    };

    function normalizeAddress(address) {
      return String(address || "").trim().toLowerCase();
    }

    function loadSensorAliases() {
      try {
        const raw = localStorage.getItem(ALIAS_STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === "object") {
          state.sensorAliases = parsed;
        }
      } catch (_) {
        state.sensorAliases = {};
      }
    }

    function persistSensorAliases() {
      try {
        localStorage.setItem(ALIAS_STORAGE_KEY, JSON.stringify(state.sensorAliases));
      } catch (_) {
      }
    }

    function loadDashboardSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return;

        if (typeof parsed.selectedAddress === "string") {
          state.selectedAddress = parsed.selectedAddress || null;
        }
        if (typeof parsed.windowSeconds === "number") {
          state.windowSeconds = Math.max(MIN_SECONDS, Math.min(MAX_SECONDS, Math.round(parsed.windowSeconds)));
        }
        if (typeof parsed.showTemp === "boolean") {
          state.showTemp = parsed.showTemp;
        }
        if (typeof parsed.showHumidity === "boolean") {
          state.showHumidity = parsed.showHumidity;
        }
        if (parsed.temperatureUnit === "C" || parsed.temperatureUnit === "F") {
          state.temperatureUnit = parsed.temperatureUnit;
        }
      } catch (_) {
      }
    }

    function persistDashboardSettings() {
      try {
        localStorage.setItem(
          SETTINGS_STORAGE_KEY,
          JSON.stringify({
            selectedAddress: state.selectedAddress,
            windowSeconds: state.windowSeconds,
            showTemp: state.showTemp,
            showHumidity: state.showHumidity,
            temperatureUnit: state.temperatureUnit,
          }),
        );
      } catch (_) {
      }
    }

    function applySettingsToControls() {
      dom.windowSeconds.value = String(state.windowSeconds);
      dom.windowSlider.value = String(secondsToSlider(state.windowSeconds));
      dom.showTemp.checked = state.showTemp;
      dom.showHumidity.checked = state.showHumidity;
      dom.tempUnitF.checked = state.temperatureUnit === "F";
      dom.tempUnitC.checked = state.temperatureUnit !== "F";
    }

    function getAliasForAddress(address) {
      return state.sensorAliases[normalizeAddress(address)] || "";
    }

    function getDisplayName(deviceName, address) {
      return getAliasForAddress(address) || deviceName || "Unknown sensor";
    }

    function getSelectedDevice() {
      return state.devices.find((device) => device.address === state.selectedAddress) || null;
    }

    function syncAliasEditor(force = false) {
      const currentAddress = normalizeAddress(state.selectedAddress);
      if (!currentAddress) {
        dom.sensorAliasInput.value = "";
        state.aliasInputAddress = null;
        state.aliasInputDirty = false;
        return;
      }

      if (
        !force &&
        state.aliasInputDirty &&
        state.aliasInputAddress === currentAddress
      ) {
        return;
      }

      dom.sensorAliasInput.value = getAliasForAddress(currentAddress);
      state.aliasInputAddress = currentAddress;
      state.aliasInputDirty = false;
    }

    function updateChartTitle() {
      const selected = getSelectedDevice();
      if (!selected) {
        dom.chartTitle.textContent = "ThermPro Monitor";
        return;
      }
      dom.chartTitle.textContent = getDisplayName(selected.name, selected.address);
    }

    function setMenuOpen(open) {
      state.menuOpen = open;
      dom.controlDrawer.classList.toggle("open", open);
      dom.drawerBackdrop.classList.toggle("visible", open);
      dom.menuButton.setAttribute("aria-expanded", String(open));
      dom.controlDrawer.setAttribute("aria-hidden", String(!open));
    }

    function formatWindow(seconds) {
      if (seconds < 120) return `${seconds}s`;
      if (seconds < 7200) return `${Math.round(seconds / 60)}m`;
      if (seconds < 172800) return `${(seconds / 3600).toFixed(1)}h`;
      return "48h";
    }

    function sliderToSeconds(sliderValue) {
      const ratio = Number(sliderValue) / 1000;
      return Math.round(MIN_SECONDS * Math.pow(MAX_SECONDS / MIN_SECONDS, ratio));
    }

    function secondsToSlider(seconds) {
      const bounded = Math.max(MIN_SECONDS, Math.min(MAX_SECONDS, Number(seconds) || MIN_SECONDS));
      const ratio = Math.log(bounded / MIN_SECONDS) / Math.log(MAX_SECONDS / MIN_SECONDS);
      return Math.round(ratio * 1000);
    }

    function convertTempFromC(celsiusValue) {
      if (!Number.isFinite(celsiusValue)) return celsiusValue;
      return state.temperatureUnit === "F"
        ? celsiusValue * 9 / 5 + 32
        : celsiusValue;
    }

    function tempUnitSuffix() {
      return state.temperatureUnit === "F" ? "F" : "C";
    }

    function formatTemperature(celsiusValue) {
      if (!Number.isFinite(celsiusValue)) return "--";
      const converted = convertTempFromC(celsiusValue);
      return `${converted.toFixed(1)} ${tempUnitSuffix()}`;
    }

    function formatTimestamp(isoValue) {
      const dt = new Date(isoValue);
      if (Number.isNaN(dt.getTime())) return isoValue;
      return dt.toLocaleString();
    }

    function lineColorTemp() {
      return getComputedStyle(document.documentElement).getPropertyValue("--temp").trim() || "#dc5f00";
    }

    function lineColorHumidity() {
      return getComputedStyle(document.documentElement).getPropertyValue("--humid").trim() || "#007e89";
    }

    function updateCurrentLegend() {
      if (!state.latest) {
        dom.currentTempValue.textContent = "--";
        dom.currentHumidityValue.textContent = "--";
        return;
      }

      const tempRaw = Number(state.latest.latestTemp);
      const humRaw = Number(state.latest.latestHumidity);
      const tempText = Number.isFinite(tempRaw)
        ? `${convertTempFromC(tempRaw).toFixed(1)} ${tempUnitSuffix()}`
        : "--";
      const humText = Number.isFinite(humRaw) ? `${Math.round(humRaw)}%` : "--";

      dom.currentTempValue.textContent = tempText;
      dom.currentHumidityValue.textContent = humText;
    }

    function updateTimeBox() {
      const now = new Date();
      dom.currentTimeDisplay.textContent = now.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
      });

      if (!state.latest || !state.latest.latestRecordedAt) {
        dom.lastUpdateValue.textContent = "--";
        return;
      }

      const dt = new Date(state.latest.latestRecordedAt);
      if (Number.isNaN(dt.getTime())) {
        dom.lastUpdateValue.textContent = state.latest.latestRecordedAt;
        return;
      }
      dom.lastUpdateValue.textContent = dt.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
      });
    }

    function drawMessage(message) {
      const canvas = dom.chart;
      const ctx = canvas.getContext("2d");
      resizeCanvasForDisplay();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#5f6f7f";
      ctx.font = "600 18px 'Avenir Next', 'Segoe UI', sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(message, canvas.width / 2, canvas.height / 2);
    }

    function resizeCanvasForDisplay() {
      const dpr = window.devicePixelRatio || 1;
      const rect = dom.chart.getBoundingClientRect();
      const width = Math.max(200, Math.floor(rect.width * dpr));
      const height = Math.max(180, Math.floor(rect.height * dpr));
      if (state.drawWidth !== width || state.drawHeight !== height) {
        state.drawWidth = width;
        state.drawHeight = height;
        dom.chart.width = width;
        dom.chart.height = height;
      }
      return dpr;
    }

    function createRange(values, fallbackMin, fallbackMax) {
      if (!values.length) return {min: fallbackMin, max: fallbackMax};
      let min = Math.min(...values);
      let max = Math.max(...values);
      if (min === max) {
        min -= 1;
        max += 1;
      } else {
        const pad = (max - min) * 0.08;
        min -= pad;
        max += pad;
      }
      return {min, max};
    }

    function drawAxisLabels(ctx, leftAxis, rightAxis, bounds, plotHeight) {
      const ticks = 5;
      const tickFont = `${Math.max(11, Math.round(bounds.scale * 11))}px 'Avenir Next', 'Segoe UI', sans-serif`;
      const headingFont = `700 ${Math.max(12, Math.round(bounds.scale * 12))}px 'Avenir Next', 'Segoe UI', sans-serif`;
      ctx.font = tickFont;
      ctx.textBaseline = "middle";

      if (leftAxis) {
        ctx.fillStyle = leftAxis.color;
        ctx.font = headingFont;
        ctx.textAlign = "right";
        ctx.fillText(leftAxis.heading, bounds.left - 10, bounds.top - Math.max(16, Math.round(bounds.scale * 16)));

        ctx.font = tickFont;
        ctx.textAlign = "right";
        for (let i = 0; i <= ticks; i += 1) {
          const ratio = i / ticks;
          const value = leftAxis.range.max - ratio * (leftAxis.range.max - leftAxis.range.min);
          const y = bounds.top + ratio * plotHeight;
          ctx.fillText(value.toFixed(leftAxis.decimals), bounds.left - 10, y);
        }
      }

      if (rightAxis) {
        ctx.fillStyle = rightAxis.color;
        ctx.font = headingFont;
        ctx.textAlign = "left";
        ctx.fillText(rightAxis.heading, bounds.right + 10, bounds.top - Math.max(16, Math.round(bounds.scale * 16)));

        ctx.font = tickFont;
        ctx.textAlign = "left";
        for (let i = 0; i <= ticks; i += 1) {
          const ratio = i / ticks;
          const value = rightAxis.range.max - ratio * (rightAxis.range.max - rightAxis.range.min);
          const y = bounds.top + ratio * plotHeight;
          ctx.fillText(value.toFixed(rightAxis.decimals), bounds.right + 10, y);
        }
      }
    }

    function drawGrid(ctx, bounds, plotWidth, plotHeight) {
      const gridColor = getComputedStyle(document.documentElement).getPropertyValue("--grid").trim() || "#d5dee8";
      ctx.strokeStyle = gridColor;
      ctx.lineWidth = Math.max(1, Math.round(bounds.scale));

      const hLines = 5;
      for (let i = 0; i <= hLines; i += 1) {
        const y = bounds.top + (i / hLines) * plotHeight;
        ctx.beginPath();
        ctx.moveTo(bounds.left, y);
        ctx.lineTo(bounds.right, y);
        ctx.stroke();
      }

      const vLines = 6;
      for (let i = 0; i <= vLines; i += 1) {
        const x = bounds.left + (i / vLines) * plotWidth;
        ctx.beginPath();
        ctx.moveTo(x, bounds.top);
        ctx.lineTo(x, bounds.bottom);
        ctx.stroke();
      }
    }

    function drawTimeLabels(ctx, points, bounds, plotWidth) {
      if (points.length < 2) return;
      const first = new Date(points[0].recorded_at).getTime();
      const last = new Date(points[points.length - 1].recorded_at).getTime();
      if (!Number.isFinite(first) || !Number.isFinite(last) || first === last) return;

      const ticks = 6;
      ctx.fillStyle = "#516272";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.font = `${Math.max(11, Math.round(bounds.scale * 11))}px 'Avenir Next', 'Segoe UI', sans-serif`;

      for (let i = 0; i <= ticks; i += 1) {
        const ratio = i / ticks;
        const ts = first + ratio * (last - first);
        const x = bounds.left + ratio * plotWidth;
        const label = new Date(ts).toLocaleTimeString([], {hour: "2-digit", minute: "2-digit"});
        ctx.fillText(label, x, bounds.bottom + Math.max(8, Math.round(bounds.scale * 8)));
      }
    }

    function drawLine(ctx, points, bounds, range, accessor, color, timeMin, timeMax, plotHeight, plotWidth) {
      if (points.length < 2) return;
      const span = timeMax - timeMin || 1;
      const ySpan = range.max - range.min || 1;
      let started = false;

      ctx.strokeStyle = color;
      ctx.lineWidth = Math.max(4, Math.round(bounds.scale * 4));
      ctx.beginPath();

      for (let i = 0; i < points.length; i += 1) {
        const ts = new Date(points[i].recorded_at).getTime();
        const value = accessor(points[i]);
        if (!Number.isFinite(ts) || !Number.isFinite(value)) continue;
        const x = bounds.left + ((ts - timeMin) / span) * plotWidth;
        const y = bounds.top + ((range.max - value) / ySpan) * plotHeight;
        if (!started) {
          ctx.moveTo(x, y);
          started = true;
        } else {
          ctx.lineTo(x, y);
        }
      }
      if (started) ctx.stroke();
    }

    function drawChart() {
      if (!state.showTemp && !state.showHumidity) {
        drawMessage("Enable temperature and/or humidity to draw the graph.");
        return;
      }
      if (!state.points.length) {
        drawMessage("No readings in the selected timescale.");
        return;
      }

      const canvas = dom.chart;
      const ctx = canvas.getContext("2d");
      const dpr = resizeCanvasForDisplay();
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const hasDualAxis = state.showTemp && state.showHumidity;
      const leftPad = Math.round(58 * dpr);
      const rightPad = hasDualAxis ? Math.round(68 * dpr) : Math.round(20 * dpr);
      const topPad = Math.round(86 * dpr);
      const bottomPad = Math.round(58 * dpr);

      const bounds = {
        left: leftPad,
        right: canvas.width - rightPad,
        top: topPad,
        bottom: canvas.height - bottomPad,
        scale: dpr,
      };
      const plotWidth = bounds.right - bounds.left;
      const plotHeight = bounds.bottom - bounds.top;
      if (plotWidth <= 0 || plotHeight <= 0) {
        drawMessage("Viewport too small to draw chart.");
        return;
      }

      drawGrid(ctx, bounds, plotWidth, plotHeight);

      const timestamps = state.points.map((p) => new Date(p.recorded_at).getTime()).filter(Number.isFinite);
      const timeMin = Math.min(...timestamps);
      const timeMax = Math.max(...timestamps);

      let leftAxis = null;
      let rightAxis = null;
      let tempRange = null;
      let humidityRange = null;

      if (state.showTemp) {
        const convertedTemps = state.points
          .map((p) => convertTempFromC(Number(p.temperature_c)))
          .filter(Number.isFinite);
        tempRange = createRange(convertedTemps, convertTempFromC(0), convertTempFromC(40));
        leftAxis = {
          range: tempRange,
          decimals: 1,
          color: lineColorTemp(),
          heading: "TEMP",
        };
      }

      if (state.showHumidity) {
        humidityRange = {min: 0, max: 100};
        if (state.showTemp) {
          rightAxis = {
            range: humidityRange,
            decimals: 0,
            color: lineColorHumidity(),
            heading: "RH",
          };
        } else {
          leftAxis = {
            range: humidityRange,
            decimals: 0,
            color: lineColorHumidity(),
            heading: "RH",
          };
        }
      }

      drawAxisLabels(ctx, leftAxis, rightAxis, bounds, plotHeight);
      drawTimeLabels(ctx, state.points, bounds, plotWidth);

      if (state.showTemp && tempRange) {
        drawLine(
          ctx,
          state.points,
          bounds,
          tempRange,
          (p) => convertTempFromC(Number(p.temperature_c)),
          lineColorTemp(),
          timeMin,
          timeMax,
          plotHeight,
          plotWidth,
        );
      }

      if (state.showHumidity && humidityRange) {
        const range = state.showTemp ? rightAxis.range : leftAxis.range;
        drawLine(
          ctx,
          state.points,
          bounds,
          range,
          (p) => Number(p.humidity_pct),
          lineColorHumidity(),
          timeMin,
          timeMax,
          plotHeight,
          plotWidth,
        );
      }
    }

    function refreshBatteryBadge() {
      if (state.batteryPct === null || state.batteryPct === undefined) {
        dom.batteryBadge.textContent = "Battery: --";
        return;
      }
      dom.batteryBadge.textContent = `Battery: ${state.batteryPct}%`;
    }

    function updateStatusText() {
      if (!state.latest) {
        dom.statusText.textContent = "No sensor data loaded yet.";
        return;
      }

      const latestTs = state.latest.latestRecordedAt
        ? formatTimestamp(state.latest.latestRecordedAt)
        : "No data yet";
      const deviceName = getDisplayName(state.latest.name, state.selectedAddress);
      const tempText = formatTemperature(Number(state.latest.latestTemp));
      const humValue = Number(state.latest.latestHumidity);
      const humText = Number.isFinite(humValue) ? `${Math.round(humValue)}%` : "--";

      dom.statusText.textContent =
        `Sensor: ${deviceName}\n` +
        `Latest: ${latestTs}\n` +
        `Temperature: ${tempText}\n` +
        `Humidity: ${humText}\n` +
        `Window: ${formatWindow(state.windowSeconds)}`;
    }

    async function loadDevices() {
      const response = await fetch("/api/devices");
      if (!response.ok) throw new Error("Failed to load devices");
      const payload = await response.json();
      state.devices = payload.devices || [];

      renderDeviceSelect(payload.default_address || null);
    }

    function renderDeviceSelect(defaultAddress = null) {
      const selectedBeforeRender = state.selectedAddress;
      dom.deviceSelect.innerHTML = "";
      if (!state.devices.length) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "No ThermoPro sensors found";
        dom.deviceSelect.appendChild(opt);
        state.selectedAddress = null;
        syncAliasEditor();
        updateChartTitle();
        persistDashboardSettings();
        return;
      }

      const selectedStillPresent = state.devices.some((d) => d.address === state.selectedAddress);
      if (!selectedStillPresent) {
        state.selectedAddress = defaultAddress || state.devices[0].address;
      }

      for (const device of state.devices) {
        const option = document.createElement("option");
        option.value = device.address;
        option.textContent = `${getDisplayName(device.name, device.address)} (${device.address})`;
        dom.deviceSelect.appendChild(option);
      }
      dom.deviceSelect.value = state.selectedAddress;
      syncAliasEditor();
      updateChartTitle();
      if (selectedBeforeRender !== state.selectedAddress) {
        persistDashboardSettings();
      }
    }

    async function loadHistory() {
      if (!state.selectedAddress) {
        state.points = [];
        state.latest = null;
        state.batteryPct = null;
        refreshBatteryBadge();
        updateCurrentLegend();
        updateTimeBox();
        updateStatusText();
        drawChart();
        return;
      }

      const params = new URLSearchParams({
        address: state.selectedAddress,
        seconds: String(state.windowSeconds),
      });
      const response = await fetch(`/api/history?${params.toString()}`);
      if (!response.ok) {
        const details = await response.text();
        throw new Error(`History request failed: ${details}`);
      }

      const payload = await response.json();
      state.points = payload.points || [];
      state.latest = {
        name: payload.name,
        latestRecordedAt: payload.latest_recorded_at,
        latestTemp: payload.latest_temperature_c,
        latestHumidity: payload.latest_humidity_pct,
      };
      state.batteryPct = payload.battery_pct;
      refreshBatteryBadge();
      updateCurrentLegend();
      updateTimeBox();
      updateStatusText();
      updateChartTitle();
      drawChart();
    }

    async function refreshAll() {
      try {
        await loadDevices();
        await loadHistory();
      } catch (err) {
        console.error(err);
        state.latest = null;
        updateCurrentLegend();
        updateTimeBox();
        dom.statusText.textContent = String(err.message || err);
        drawMessage("Unable to load data.");
      }
    }

    function bindEvents() {
      dom.menuButton.addEventListener("click", () => {
        setMenuOpen(!state.menuOpen);
      });
      dom.closeMenuButton.addEventListener("click", () => {
        setMenuOpen(false);
      });
      dom.drawerBackdrop.addEventListener("click", () => {
        setMenuOpen(false);
      });

      dom.deviceSelect.addEventListener("change", async () => {
        state.selectedAddress = dom.deviceSelect.value || null;
        persistDashboardSettings();
        syncAliasEditor(true);
        updateChartTitle();
        await loadHistory();
      });

      dom.windowSlider.addEventListener("input", async () => {
        const sec = sliderToSeconds(dom.windowSlider.value);
        state.windowSeconds = sec;
        dom.windowSeconds.value = String(sec);
        persistDashboardSettings();
        await loadHistory();
      });

      dom.windowSeconds.addEventListener("change", async () => {
        const sec = Math.max(MIN_SECONDS, Math.min(MAX_SECONDS, Number(dom.windowSeconds.value) || MIN_SECONDS));
        state.windowSeconds = sec;
        dom.windowSeconds.value = String(sec);
        dom.windowSlider.value = String(secondsToSlider(sec));
        persistDashboardSettings();
        await loadHistory();
      });

      dom.showTemp.addEventListener("change", () => {
        state.showTemp = dom.showTemp.checked;
        persistDashboardSettings();
        drawChart();
      });

      dom.showHumidity.addEventListener("change", () => {
        state.showHumidity = dom.showHumidity.checked;
        persistDashboardSettings();
        drawChart();
      });

      const applySelectedUnit = () => {
        state.temperatureUnit = dom.tempUnitF.checked ? "F" : "C";
        persistDashboardSettings();
        updateCurrentLegend();
        updateStatusText();
        drawChart();
      };

      dom.tempUnitC.addEventListener("change", applySelectedUnit);
      dom.tempUnitF.addEventListener("change", applySelectedUnit);

      dom.saveAliasButton.addEventListener("click", () => {
        if (!state.selectedAddress) return;
        const key = normalizeAddress(state.selectedAddress);
        const alias = dom.sensorAliasInput.value.trim();
        if (alias) {
          state.sensorAliases[key] = alias;
        } else {
          delete state.sensorAliases[key];
        }
        persistSensorAliases();
        state.aliasInputAddress = key;
        state.aliasInputDirty = false;
        renderDeviceSelect();
        updateStatusText();
      });

      dom.clearAliasButton.addEventListener("click", () => {
        if (!state.selectedAddress) return;
        const key = normalizeAddress(state.selectedAddress);
        delete state.sensorAliases[key];
        dom.sensorAliasInput.value = "";
        state.aliasInputAddress = key;
        state.aliasInputDirty = false;
        persistSensorAliases();
        renderDeviceSelect();
        updateStatusText();
      });

      dom.sensorAliasInput.addEventListener("input", () => {
        state.aliasInputAddress = normalizeAddress(state.selectedAddress);
        state.aliasInputDirty = true;
      });

      dom.sensorAliasInput.addEventListener("keydown", (event) => {
        if (event.key !== "Enter") return;
        event.preventDefault();
        dom.saveAliasButton.click();
      });

      window.addEventListener("resize", () => {
        drawChart();
      });
    }

    async function init() {
      loadDashboardSettings();
      applySettingsToControls();

      loadSensorAliases();
      updateCurrentLegend();
      updateTimeBox();
      bindEvents();
      await refreshAll();
      window.setInterval(refreshAll, REFRESH_MS);
      window.setInterval(updateTimeBox, 1000);
    }

    init();
  </script>
</body>
</html>
